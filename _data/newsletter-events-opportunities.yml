- expires: 2026-05-01
  type: opportunity
  title: "📣 Call for Papers – SP4Sci’26 Workshop on Scalable, Portable & Productive Scientific Computing"
  preamble: |
    We would like to bring to your attention the SP4Sci’26 Workshop on Scalable, Portable and Productive Scientific Computing, which will be held in conjunction with ACM Computing Frontiers 2026 (Catania, Italy, May 19-21, 2026).

    The workshop focuses on programming models, tools, runtime systems, and application experiences that enable scientific software to achieve performance, portability, and long-term maintainability across increasingly heterogeneous computing platforms.

    We would appreciate your consideration in submitting a paper to the workshop. We welcome contributions covering (but not limited to):
    - Performance-portable programming models and compilers
    - Abstractions, DSLs, and frameworks for scientific applications
    - Strategies for porting legacy codes to heterogeneous architectures
    - Runtime systems and co-design approaches
    - Case studies and experience reports from real scientific workloads
  links: |
    Full details, including topics of interest and submission instructions, are available on the workshop [website.](https://sp4sci.github.io/)

- expires: 2026-07-15
  type: opportunity
  title: "ANNOUNCING THE OSG SCHOOL 2026! 🎓"
  preamble: |
    Could you transform your research with extra computing capacity beyond your
    laptop or lab computers? Do you need help managing your research computing
    workloads with automation? If you run or support research workloads that
    can be described by lists of independent computing tasks, we can help! For
    example: https://osg-htc.org/services/open_science_pool.html

    We are seeking applicants for the OSG School 2026, to be held July 13-17 at
    the beautiful University of Wisconsin-Madison. Apply by March 20!

    The OSG School teaches you how to use high-throughput computing effectively
    and get a research workload up and running. We use lectures, demos, hands-
    on exercises, personal consulting with OSG experts, and even roleplaying.

    Past participants have come from physics, chemistry, engineering, math, bio
    and life sciences, earth sciences, agricultural and animal sciences, social
    sciences, economics, medicine, and more.

    Ideal candidates are:

    * Researchers (especially graduate students and post-docs) for whom large-
    scale computing is a key part of the research process;

    * Research support staff who work with current or potential users of high
    throughput computing;

    * Instructors (at the post-secondary level) who are ready to integrate high
    throughput computing into their research based curriculum.

    We aim to pay all base travel, hotel, and food costs for applicants whom we
    invite to attend.

    This is an in-person event, and we strive to provide a healthy environment
    for all.
  links: |
    Learn more at: [OSG School 2026](https://osg-htc.org/school-2026/) and apply by March 20, 2026!

- expires: 2026-03-30
